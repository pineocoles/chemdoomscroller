<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <title>chemdoomscroller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- top bar -->
  <header class="topbar">
    <button id="filterBtn" class="iconbtn" aria-label="filter topics">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
    </button>
    <div class="streak" id="streak">
      <span class="streak-flame">◆</span>
      <span class="streak-num" id="streakNum">0</span>
    </div>
    <button id="bookletBtn" class="iconbtn" aria-label="data booklet">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12a4 4 0 0 1 4 4v12H8a4 4 0 0 1-4-4z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/></svg>
    </button>
  </header>

  <!-- progress bar -->
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>

  <!-- main feed -->
  <main class="feed" id="feed">
    <!-- splash card -->
    <section class="card splash">
      <div class="splash-inner">
        <div class="brand-mark">Cl</div>
        <h1 class="brand">chem<span>doom</span></h1>
        <p class="brand-sub">IB chemistry SL · scroll to start</p>
        <div class="swipe-hint">
          <span>swipe up</span>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </div>
      </div>
    </section>
    <!-- cards injected here -->
  </main>

  <!-- sentinel for infinite scroll -->
  <div id="sentinel"></div>

  <!-- bottom feedback sheet (slides up after answer) -->
  <div class="sheet" id="feedbackSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <div class="feedback-tag" id="feedbackTag">CORRECT</div>
      <p class="feedback-explanation" id="feedbackExplanation"></p>
      <button class="nextbtn" id="nextBtn">next question →</button>
    </div>
  </div>

  <!-- data booklet sheet -->
  <div class="sheet sheet-tall" id="bookletSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <h2 class="sheet-title">data booklet</h2>
      <div class="booklet-tabs">
        <button class="tab active" data-tab="constants">constants</button>
        <button class="tab" data-tab="periodic">periodic table</button>
        <button class="tab" data-tab="equations">equations</button>
      </div>
      <div class="booklet-body">
        <div class="tab-content active" data-content="constants">
          <p class="placeholder">data booklet content loads here</p>
        </div>
        <div class="tab-content" data-content="periodic">
          <p class="placeholder">periodic table loads here</p>
        </div>
        <div class="tab-content" data-content="equations">
          <p class="placeholder">equations load here</p>
        </div>
      </div>
    </div>
  </div>

  <!-- filter sheet -->
  <div class="sheet sheet-tall" id="filterSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <h2 class="sheet-title">topics</h2>
      <p class="sheet-sub">pick what you want to grind</p>

      <div class="theme-toggle-section">
        <label class="theme-toggle">
          <input type="checkbox" id="themeToggle" />
          <span class="theme-label">light mode</span>
        </label>
      </div>

      <div class="filter-body" id="filterBody"></div>
      <button class="nextbtn" id="applyFilterBtn">apply</button>
    </div>
  </div>

  <!-- scrim -->
  <div class="scrim" id="scrim"></div>

  <script src="app.js"></script>
</body>
</html>
